name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether deploy is configured
        id: guard
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "FIREBASE_SERVICE_ACCOUNT secret not set yet; skipping deploy (this is expected until Firebase is wired)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4
      - name: Deploy to Firebase Hosting (live channel)
        if: steps.guard.outputs.configured == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: __PROJECT_ID__

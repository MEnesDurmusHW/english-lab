<body>
<div class="grain"></div>
<script>window.LAB_SECTION='articles';</script>
<script src="appbar.js"></script>

<div class="wrap">

  <div class="reading-view" id="view-reading">
    <div class="rd-controls">
      <span class="count" id="count"></span>
      <button class="btn" id="rdToggle" aria-pressed="false" style="margin-left:auto">Türkçeyi gizle</button>
    </div>
    <div id="rdList"></div>
  </div>

</div>

<script src="data.js"></script>
<script src="lab-core.js"></script>
<script>
/* ============ OKUMA (hikâyeler) ============ */
const readingView=document.getElementById('view-reading');
const rdList=document.getElementById('rdList'), rdToggle=document.getElementById('rdToggle');
const countEl=document.getElementById('count');
function renderArticleEN(text){
  return text.trim().split(/\n\s*\n/).map(p=>
    '<p>'+p.trim().replace(/\{\{([^}|]+)(?:\|([^}]+))?\}\}/g,(m,a,b)=>{
      const base=(b||a).trim().toLowerCase();
      return '<b class="artword wordref" data-w="'+base+'">'+a.trim()+'</b>';
    })+'</p>'
  ).join('');
}
function renderArticleTR(text){
  return text.trim().split(/\n\s*\n/).map(p=>'<p>'+p.trim()+'</p>').join('');
}
function renderReading(){
  rdList.innerHTML = ARTICLES.map(a=>
    '<article class="art">'+
      '<h3 class="art-title">'+a.title+'</h3>'+
      '<div class="art-en">'+renderArticleEN(a.en)+'</div>'+
      '<div class="art-tr">'+renderArticleTR(a.tr)+'</div>'+
    '</article>'
  ).join('');
  if(countEl) countEl.textContent = ARTICLES.length+' hikâye';
}
rdToggle.addEventListener('click', ()=>{
  const hidden=readingView.classList.toggle('hide-tr');
  rdToggle.setAttribute('aria-pressed', hidden?'true':'false');
  rdToggle.textContent = hidden ? 'Türkçeyi göster' : 'Türkçeyi gizle';
});
renderReading();
</script>
</body>
</html>
